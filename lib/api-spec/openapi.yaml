openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: HOOK affiliate fashion website API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: subcategories
  - name: products
  - name: looks
  - name: setups
  - name: newsletter
  - name: admin
  - name: Storage
    description: Object storage upload and serving endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /subcategories:
    get:
      operationId: listSubcategories
      tags: [subcategories]
      summary: List subcategories
      parameters:
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of subcategories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subcategory"
    post:
      operationId: createSubcategory
      tags: [subcategories]
      summary: Create a subcategory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubcategoryInput"
      responses:
        "201":
          description: Created subcategory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subcategory"

  /subcategories/{id}:
    patch:
      operationId: updateSubcategory
      tags: [subcategories]
      summary: Update a subcategory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubcategoryInput"
      responses:
        "200":
          description: Updated subcategory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subcategory"
    delete:
      operationId: deleteSubcategory
      tags: [subcategories]
      summary: Delete a subcategory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: subcategory
          in: query
          schema:
            type: string
        - name: featured
          in: query
          schema:
            type: boolean
        - name: trending
          in: query
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /looks:
    get:
      operationId: listLooks
      tags: [looks]
      summary: List curated looks
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of looks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Look"
    post:
      operationId: createLook
      tags: [looks]
      summary: Create a look
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LookInput"
      responses:
        "201":
          description: Created look
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Look"

  /looks/{id}:
    get:
      operationId: getLook
      tags: [looks]
      summary: Get a look
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Look
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Look"
        "404":
          description: Not found
    patch:
      operationId: updateLook
      tags: [looks]
      summary: Update a look
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LookUpdate"
      responses:
        "200":
          description: Updated look
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Look"
    delete:
      operationId: deleteLook
      tags: [looks]
      summary: Delete a look
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /setups:
    get:
      operationId: listSetups
      tags: [setups]
      summary: List curated setups
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of setups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Setup"
    post:
      operationId: createSetup
      tags: [setups]
      summary: Create a setup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupInput"
      responses:
        "201":
          description: Created setup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Setup"

  /setups/{id}:
    get:
      operationId: getSetup
      tags: [setups]
      summary: Get a setup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Setup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Setup"
        "404":
          description: Not found
    patch:
      operationId: updateSetup
      tags: [setups]
      summary: Update a setup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupUpdate"
      responses:
        "200":
          description: Updated setup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Setup"
    delete:
      operationId: deleteSetup
      tags: [setups]
      summary: Delete a setup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /newsletter:
    post:
      operationId: subscribeNewsletter
      tags: [newsletter]
      summary: Subscribe to newsletter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewsletterInput"
      responses:
        "201":
          description: Subscribed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsletterSubscriber"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get admin dashboard statistics
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/products:
    get:
      operationId: listAdminProducts
      tags: [admin]
      summary: List all products for admin
      responses:
        "200":
          description: All products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an uploaded object
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content.
          content:
            '*/*':
              schema:
                type: string
                format: binary

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Subcategory:
      type: object
      required: [id, category, name]
      properties:
        id:
          type: integer
        category:
          type: string
          enum: [women, men, electronics, home]
        name:
          type: string

    SubcategoryInput:
      type: object
      required: [category, name]
      properties:
        category:
          type: string
          enum: [women, men, electronics, home]
        name:
          type: string

    Product:
      type: object
      required: [id, title, source, category, affiliateUrl, status, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        source:
          type: string
          enum: [SHEIN, Amazon]
        category:
          type: string
          enum: [women, men, electronics, home, accessories]
        subcategory:
          type: ["string", "null"]
        price:
          type: ["string", "null"]
        originalPrice:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        images:
          type: array
          items:
            type: string
        affiliateUrl:
          type: string
        brand:
          type: ["string", "null"]
        externalId:
          type: ["string", "null"]
        colors:
          type: array
          items:
            type: string
        sizes:
          type: array
          items:
            type: string
        featured:
          type: boolean
        trending:
          type: boolean
        status:
          type: string
          enum: [active, hidden]
        imagePosX:
          type: integer
        imagePosY:
          type: integer
        imageScale:
          type: integer
        imageObjectFit:
          type: string
          enum: [cover, contain]
        createdAt:
          type: string

    ProductInput:
      type: object
      required: [title, source, category, affiliateUrl]
      properties:
        title:
          type: string
        description:
          type: string
        source:
          type: string
          enum: [SHEIN, Amazon]
        category:
          type: string
          enum: [women, men, electronics, home, accessories]
        subcategory:
          type: string
        price:
          type: string
        originalPrice:
          type: string
        imageUrl:
          type: string
        images:
          type: array
          items:
            type: string
        affiliateUrl:
          type: string
        brand:
          type: string
        externalId:
          type: string
        colors:
          type: array
          items:
            type: string
        sizes:
          type: array
          items:
            type: string
        featured:
          type: boolean
        trending:
          type: boolean
        status:
          type: string
          enum: [active, hidden]
        imagePosX:
          type: integer
        imagePosY:
          type: integer
        imageScale:
          type: integer
        imageObjectFit:
          type: string
          enum: [cover, contain]

    ProductUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        source:
          type: string
          enum: [SHEIN, Amazon]
        category:
          type: string
          enum: [women, men, electronics, home, accessories]
        subcategory:
          type: string
        price:
          type: string
        originalPrice:
          type: string
        imageUrl:
          type: string
        images:
          type: array
          items:
            type: string
        affiliateUrl:
          type: string
        brand:
          type: string
        externalId:
          type: string
        colors:
          type: array
          items:
            type: string
        sizes:
          type: array
          items:
            type: string
        featured:
          type: boolean
        trending:
          type: boolean
        status:
          type: string
          enum: [active, hidden]
        imagePosX:
          type: integer
        imagePosY:
          type: integer
        imageScale:
          type: integer
        imageObjectFit:
          type: string
          enum: [cover, contain]

    Look:
      type: object
      required: [id, title, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        imagePosX:
          type: integer
        imagePosY:
          type: integer
        imageScale:
          type: integer
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        createdAt:
          type: string

    LookInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
        description:
          type: string
        imageUrl:
          type: string
        imagePosX:
          type: integer
        imagePosY:
          type: integer
        imageScale:
          type: integer
        productIds:
          type: array
          items:
            type: integer

    LookUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        imageUrl:
          type: string
        imagePosX:
          type: integer
        imagePosY:
          type: integer
        imageScale:
          type: integer
        productIds:
          type: array
          items:
            type: integer

    Setup:
      type: object
      required: [id, title, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        imagePosX:
          type: integer
        imagePosY:
          type: integer
        imageScale:
          type: integer
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        createdAt:
          type: string

    SetupInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
        description:
          type: string
        imageUrl:
          type: string
        imagePosX:
          type: integer
        imagePosY:
          type: integer
        imageScale:
          type: integer
        productIds:
          type: array
          items:
            type: integer

    SetupUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        imageUrl:
          type: string
        imagePosX:
          type: integer
        imagePosY:
          type: integer
        imageScale:
          type: integer
        productIds:
          type: array
          items:
            type: integer

    NewsletterSubscriber:
      type: object
      required: [id, email, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        createdAt:
          type: string

    NewsletterInput:
      type: object
      required: [email]
      properties:
        email:
          type: string

    AdminStats:
      type: object
      required: [totalProducts, totalLooks, totalSubscribers, productsByCategory, featuredCount, trendingCount]
      properties:
        totalProducts:
          type: integer
        totalLooks:
          type: integer
        totalSubscribers:
          type: integer
        productsByCategory:
          type: object
          properties:
            women:
              type: integer
            men:
              type: integer
            electronics:
              type: integer
            home:
              type: integer
          required: [women, men, electronics, home]
        featuredCount:
          type: integer
        trendingCount:
          type: integer

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name.
        size:
          type: integer
          minimum: 1
          description: File size in bytes.
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file (e.g. image/jpeg).
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
          description: Presigned GCS URL for PUT upload.
        objectPath:
          type: string
          description: Normalized object path (e.g. /objects/uploads/uuid). Store this in your database.
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'
