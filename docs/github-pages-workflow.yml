name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Codegen (OpenAPI hooks + Zod)
        run: pnpm --filter @workspace/api-spec run codegen

      - name: Build frontend
        env:
          NODE_ENV: production
          PORT: '3000'
          BASE_PATH: /
          VITE_API_BASE_URL: https://fashion-hook.replit.app
        run: pnpm --filter @workspace/hook run build

      - name: Copy index.html to 404.html for SPA routing
        run: cp artifacts/hook/dist/public/index.html artifacts/hook/dist/public/404.html

      - name: Add .nojekyll
        run: touch artifacts/hook/dist/public/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/hook/dist/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
